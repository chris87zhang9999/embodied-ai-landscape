name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Copy data to public and update manifest
        run: |
          cp -r data public/
          python3 - <<'EOF'
          import json, glob, re
          from pathlib import Path
          files = sorted(glob.glob("data/snapshots/[0-9][0-9][0-9][0-9]-[0-9][0-9].json"))
          periods = [re.search(r'(\d{4}-\d{2})\.json', f).group(1) for f in files]
          Path("public/snapshots-manifest.json").write_text(json.dumps({"periods": periods}))
          EOF

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
